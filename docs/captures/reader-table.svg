<text x="9" y="140" textLength="9" lengthAdjust="spacingAndGlyphs" fill="#3c3c4d">│</text>
<text x="18" y="140" textLength="180" lengthAdjust="spacingAndGlyphs" fill="#eeeeee">its own border rule.</text>
